<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw; height: 100vh;
  background: transparent !important;
  overflow: hidden;
  pointer-events: none;
}

/* The glow lives as box-shadow on a border div č GPU composited, genuinely luminous */
.ring {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  border-radius: 0;
  /* 3 layers of box-shadow: tight crisp line + medium halo + wide outer bloom */
  box-shadow:
    inset 0 0 0 2px rgba(232, 60, 110, 0.9),
    inset 0 0 20px 4px rgba(220, 50, 100, 0.7),
    inset 0 0 60px 10px rgba(200, 40, 90, 0.35),
    inset 0 0 120px 20px rgba(180, 30, 80, 0.15);
  animation: breathe 3s ease-in-out infinite, colorshift 6s ease-in-out infinite;
}

@keyframes breathe {
  0%   { opacity: 0.7; }
  50%  { opacity: 1.0; }
  100% { opacity: 0.7; }
}

@keyframes colorshift {
  0%   {
    box-shadow:
      inset 0 0 0 2px rgba(232, 60, 110, 0.9),
      inset 0 0 20px 4px rgba(220, 50, 100, 0.7),
      inset 0 0 60px 10px rgba(200, 40, 90, 0.35),
      inset 0 0 120px 20px rgba(180, 30, 80, 0.15);
  }
  33%  {
    box-shadow:
      inset 0 0 0 2px rgba(255, 100, 150, 0.9),
      inset 0 0 20px 4px rgba(245, 80, 130, 0.7),
      inset 0 0 60px 10px rgba(220, 60, 110, 0.35),
      inset 0 0 120px 20px rgba(200, 45, 95, 0.15);
  }
  66%  {
    box-shadow:
      inset 0 0 0 2px rgba(210, 45, 95, 0.9),
      inset 0 0 20px 4px rgba(195, 35, 85, 0.7),
      inset 0 0 60px 10px rgba(175, 25, 75, 0.35),
      inset 0 0 120px 20px rgba(155, 20, 65, 0.15);
  }
  100% {
    box-shadow:
      inset 0 0 0 2px rgba(232, 60, 110, 0.9),
      inset 0 0 20px 4px rgba(220, 50, 100, 0.7),
      inset 0 0 60px 10px rgba(200, 40, 90, 0.35),
      inset 0 0 120px 20px rgba(180, 30, 80, 0.15);
  }
}
</style>
</head>
<body>
  <div class="ring"></div>
</body>
</html>
