<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent !important;
      overflow: hidden;
      pointer-events: none;
      -webkit-app-region: no-drag;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="glow"></canvas>
  <script>
    const canvas = document.getElementById('glow');
    const ctx    = canvas.getContext('2d');
    const DPR    = window.devicePixelRatio || 1;

    const W_CSS = window.screen.width;
    const H_CSS = window.screen.height;

    canvas.style.width  = W_CSS + 'px';
    canvas.style.height = H_CSS + 'px';
    canvas.width  = W_CSS * DPR;
    canvas.height = H_CSS * DPR;

    // BLOOM sunset — amber → coral → pink
    const PALETTE = [
      [255, 180,  71],
      [244, 162,  97],
      [231, 111, 138],
      [244, 130, 100],
      [255, 160,  80],
      [231, 111, 138],
    ];

    const SEGMENTS      = 280;
    const GLOW_WIDTH    = 18;   // thin sharp core
    const FLOW_SPEED    = 0.00014; // color travel speed
    const BREATHE_SPEED = 0.00085; // pulse rate

    function getColor(pos, alpha) {
      const n = PALETTE.length - 1;
      const p = ((pos % 1) + 1) % 1;
      const i = Math.floor(p * n);
      const t = p * n - i;
      const a = PALETTE[i];
      const b = PALETTE[Math.min(i + 1, n)];
      const r = Math.round(a[0] + (b[0]-a[0]) * t);
      const g = Math.round(a[1] + (b[1]-a[1]) * t);
      const bv= Math.round(a[2] + (b[2]-a[2]) * t);
      return `rgba(${r},${g},${bv},${alpha.toFixed(3)})`;
    }

    function perimToXY(t) {
      const perim = 2 * (W_CSS + H_CSS);
      const d = ((t % 1) + 1) % 1 * perim;
      if      (d < W_CSS)            return [d,              0      ];
      else if (d < W_CSS + H_CSS)    return [W_CSS,          d - W_CSS];
      else if (d < 2*W_CSS + H_CSS)  return [W_CSS-(d-W_CSS-H_CSS), H_CSS];
      else                           return [0,              H_CSS-(d-2*W_CSS-H_CSS)];
    }

    function draw(ts) {
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.setTransform(DPR,0,0,DPR,0,0);

      // Breathing — smooth sine, 0.4 → 1.0
      const breath = 0.4 + 0.6 * (Math.sin(ts * BREATHE_SPEED) * 0.5 + 0.5);

      // Flow — offset marches forward over time
      const flow = ts * FLOW_SPEED;

      // ── Pass 1: sharp thin core ──────────────────────────────────────
      ctx.save();
      ctx.lineWidth = GLOW_WIDTH;
      ctx.lineCap   = 'round';
      for (let i = 0; i < SEGMENTS; i++) {
        const t0 = i / SEGMENTS;
        const t1 = (i + 1.4) / SEGMENTS;
        const [x0, y0] = perimToXY(t0);
        const [x1, y1] = perimToXY(t1);
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.strokeStyle = getColor((t0 + flow) % 1, breath * 0.90);
        ctx.stroke();
      }
      ctx.restore();

      // ── Pass 2: soft blur halo ───────────────────────────────────────
      ctx.save();
      ctx.filter    = 'blur(10px)';
      ctx.lineWidth = GLOW_WIDTH * 1.8;
      ctx.lineCap   = 'round';
      for (let i = 0; i < SEGMENTS; i++) {
        const t0 = i / SEGMENTS;
        const t1 = (i + 1.4) / SEGMENTS;
        const [x0, y0] = perimToXY(t0);
        const [x1, y1] = perimToXY(t1);
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.strokeStyle = getColor((t0 + flow) % 1, breath * 0.38);
        ctx.stroke();
      }
      ctx.restore();

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>
</body>
</html>
