<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    canvas { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: opacity 1.4s ease; }
    canvas.visible { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    var canvas = document.getElementById('c');
    var ctx = canvas.getContext('2d');
    var offBloom = document.createElement('canvas');
    var offGlow  = document.createElement('canvas');
    var offBar   = document.createElement('canvas');
    var offHalo  = document.createElement('canvas');
    var offNeedle= document.createElement('canvas');

    function resize() {
      var w=window.innerWidth,h=window.innerHeight;
      [canvas,offBloom,offGlow,offBar,offHalo,offNeedle].forEach(function(c){c.width=w;c.height=h;});
    }
    resize();
    window.addEventListener('resize',resize);

    var BRAND=[
      {r:255,g:120,b:10},
      {r:255,g:75, b:45},
      {r:248,g:60, b:118},
      {r:210,g:50, b:140},
      {r:240,g:78, b:85},
      {r:255,g:105,b:35},
    ];
    var BN=BRAND.length;
    function lerp(a,b,f){return {r:a.r+(b.r-a.r)*f,g:a.g+(b.g-a.g)*f,b:a.b+(b.b-a.b)*f};}
    function col(t,offset){
      var s=((t+offset)%1+1)%1,sc=s*BN,i=Math.floor(sc)%BN,j=(i+1)%BN,f=sc-Math.floor(sc);
      return lerp(BRAND[i],BRAND[j],f);
    }
    function pt(t,w,h){
      var p=2*(w+h),d=((t%1)+1)%1*p;
      if(d<w)return{x:d,y:0};
      else if(d<w+h)return{x:w,y:d-w};
      else if(d<2*w+h)return{x:w-(d-w-h),y:h};
      else return{x:0,y:h-(d-2*w-h)};
    }
    var N=600;
    function drawRing(oc,w,h,lw,alpha,offset){
      var cx=oc.getContext('2d');cx.clearRect(0,0,w,h);cx.lineWidth=lw;cx.lineCap='butt';
      for(var i=0;i<N;i++){
        var tM=(i+.5)/N,c=col(tM,offset),p0=pt(i/N,w,h),p1=pt((i+1)/N,w,h);
        cx.beginPath();cx.moveTo(p0.x,p0.y);cx.lineTo(p1.x,p1.y);
        cx.strokeStyle='rgba('+c.r+','+c.g+','+c.b+','+alpha+')';cx.stroke();
      }
    }
    function drawSpot(oc,w,h,lw,s1,s2,hw,peakA,wMix){
      var cx=oc.getContext('2d');cx.clearRect(0,0,w,h);cx.lineWidth=lw;cx.lineCap='round';
      for(var i=0;i<N;i++){
        var tM=(i+.5)/N;
        var d1=Math.abs(tM-s1);if(d1>.5)d1=1-d1;
        var d2=Math.abs(tM-s2);if(d2>.5)d2=1-d2;
        var d=Math.min(d1,d2),inten=Math.max(0,1-d/hw);
        inten=inten*inten*inten;
        if(inten<.008)continue;
        var c=col(tM,0),wm=wMix*inten;
        var fr=Math.round(c.r+(255-c.r)*wm),fg=Math.round(c.g+(255-c.g)*wm),fb=Math.round(c.b+(255-c.b)*wm);
        var p0=pt(i/N,w,h),p1=pt((i+1)/N,w,h);
        cx.beginPath();cx.moveTo(p0.x,p0.y);cx.lineTo(p1.x,p1.y);
        cx.strokeStyle='rgba('+fr+','+fg+','+fb+','+(inten*peakA)+')';cx.stroke();
      }
    }
    var t0=null,COLOR_T=20000,SPOT1_T=11000,SPOT2_T=15300;
    function frame(ts){
      if(!t0)t0=ts;
      var e=ts-t0,cOff=(e/COLOR_T)%1,s1=(e/SPOT1_T)%1,s2=1-((e/SPOT2_T)%1);
      var breathe=0.88+0.12*Math.sin(e/4500*Math.PI*2);
      var w=canvas.width,h=canvas.height;
      drawRing(offBloom,w,h,44,0.80,cOff);
      drawRing(offGlow, w,h,12,0.88,cOff);
      drawRing(offBar,  w,h,2.5,0.92,cOff);
      drawSpot(offHalo,  w,h,30,s1,s2,0.18,0.95,0.55);
      drawSpot(offNeedle,w,h,2, s1,s2,0.05,1.00,0.92);
      ctx.clearRect(0,0,w,h);ctx.globalAlpha=breathe;
      ctx.filter='blur(24px)';ctx.drawImage(offBloom,0,0);
      ctx.filter='blur(5px)'; ctx.drawImage(offGlow,0,0);
      ctx.filter='none';      ctx.drawImage(offBar,0,0);
      ctx.filter='blur(16px)';ctx.drawImage(offHalo,0,0);
      ctx.filter='none';      ctx.drawImage(offNeedle,0,0);
      ctx.globalAlpha=1;ctx.filter='none';
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(function(){canvas.classList.add('visible');requestAnimationFrame(frame);});
  </script>
</body>
</html>
