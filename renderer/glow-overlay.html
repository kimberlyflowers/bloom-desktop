<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw; height: 100vh;
  background: transparent !important;
  overflow: hidden;
  pointer-events: none;
}
.ring {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  animation: breathe 3s ease-in-out infinite, colorshift 8s ease-in-out infinite;
}
@keyframes breathe {
  0%   { opacity: 0.65; }
  50%  { opacity: 1.0; }
  100% { opacity: 0.65; }
}
@keyframes colorshift {
  0% {
    box-shadow:
      inset 0 0 0 2px rgba(255, 120, 60, 0.95),
      inset 0 0 18px 4px rgba(245, 90, 50, 0.75),
      inset 0 0 55px 12px rgba(230, 70, 80, 0.4),
      inset 0 0 110px 22px rgba(210, 50, 90, 0.18);
  }
  25% {
    box-shadow:
      inset 0 0 0 2px rgba(245, 100, 90, 0.95),
      inset 0 0 18px 4px rgba(235, 75, 100, 0.75),
      inset 0 0 55px 12px rgba(220, 60, 110, 0.4),
      inset 0 0 110px 22px rgba(200, 45, 100, 0.18);
  }
  50% {
    box-shadow:
      inset 0 0 0 2px rgba(240, 80, 120, 0.95),
      inset 0 0 18px 4px rgba(225, 60, 105, 0.75),
      inset 0 0 55px 12px rgba(210, 50, 95, 0.4),
      inset 0 0 110px 22px rgba(190, 40, 85, 0.18);
  }
  75% {
    box-shadow:
      inset 0 0 0 2px rgba(255, 110, 70, 0.95),
      inset 0 0 18px 4px rgba(245, 85, 60, 0.75),
      inset 0 0 55px 12px rgba(230, 65, 85, 0.4),
      inset 0 0 110px 22px rgba(215, 50, 90, 0.18);
  }
  100% {
    box-shadow:
      inset 0 0 0 2px rgba(255, 120, 60, 0.95),
      inset 0 0 18px 4px rgba(245, 90, 50, 0.75),
      inset 0 0 55px 12px rgba(230, 70, 80, 0.4),
      inset 0 0 110px 22px rgba(210, 50, 90, 0.18);
  }
}
</style>
</head>
<body>
  <div class="ring"></div>
</body>
</html>
