<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      -webkit-app-region: no-drag;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body>
  <canvas id="glow"></canvas>

  <script>
    const canvas = document.getElementById('glow');
    const ctx = canvas.getContext('2d');

    // Fade in
    requestAnimationFrame(() => { canvas.style.opacity = '1'; });

    // BLOOM sunset palette
    const COLORS = [
      { r: 255, g: 180, b:  71 },  // warm amber
      { r: 244, g: 162, b:  97 },  // coral
      { r: 231, g: 111, b: 138 },  // pink
      { r: 244, g: 130, b: 100 },  // coral-orange
      { r: 255, g: 160, b:  80 },  // amber-orange
      { r: 231, g: 111, b: 138 },  // pink (loop close)
    ];

    const FLOW_SPEED    = 0.00016; // color travel speed around border
    const BREATHE_SPEED = 0.0008;  // pulse rate
    const GLOW_WIDTH    = 52;      // glow thickness inward
    const SEGMENTS      = 320;     // smoothness of the ring
    const BLUR_PASSES   = 3;       // layered softness

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function lerpColor(a, b, t) {
      return {
        r: a.r + (b.r - a.r) * t,
        g: a.g + (b.g - a.g) * t,
        b: a.b + (b.b - a.b) * t,
      };
    }

    function getColor(pos, alpha) {
      const n = COLORS.length - 1;
      const p = ((pos % 1) + 1) % 1;
      const idx = p * n;
      const i = Math.floor(idx);
      const t = idx - i;
      const c = lerpColor(COLORS[i], COLORS[Math.min(i + 1, n)], t);
      return `rgba(${Math.round(c.r)},${Math.round(c.g)},${Math.round(c.b)},${alpha.toFixed(3)})`;
    }

    // Map 0..1 clockwise around perimeter to x,y
    function perimToXY(t, W, H) {
      const perim = 2 * (W + H);
      const d = ((t % 1) + 1) % 1 * perim;
      if (d < W)           return { x: d,           y: 0 };
      else if (d < W + H)  return { x: W,            y: d - W };
      else if (d < 2*W+H)  return { x: W-(d-W-H),   y: H };
      else                 return { x: 0,            y: H-(d-2*W-H) };
    }

    function draw(timestamp) {
      const W = canvas.width;
      const H = canvas.height;

      ctx.clearRect(0, 0, W, H);

      // Breathing: gentle sine pulse
      const breathe = 0.68 + 0.32 * (Math.sin(timestamp * BREATHE_SPEED - Math.PI / 2) * 0.5 + 0.5);

      // Flow offset: drives colors around the border over time
      const timeOffset = timestamp * FLOW_SPEED;

      for (let pass = 0; pass < BLUR_PASSES; pass++) {
        const blurPx    = (pass + 1) * 13;
        const alphaBase = pass === 0 ? 0.90 : 0.45 / pass;
        const lineW     = GLOW_WIDTH + pass * 10;

        ctx.save();
        ctx.filter  = `blur(${blurPx}px)`;
        ctx.lineWidth = lineW;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        for (let i = 0; i < SEGMENTS; i++) {
          const t0 = i / SEGMENTS;
          const t1 = (i + 1.6) / SEGMENTS;

          const p0 = perimToXY(t0, W, H);
          const p1 = perimToXY(t1, W, H);

          const colorPos = (t0 + timeOffset) % 1;
          const alpha    = breathe * alphaBase;

          ctx.beginPath();
          ctx.moveTo(p0.x, p0.y);
          ctx.lineTo(p1.x, p1.y);
          ctx.strokeStyle = getColor(colorPos, alpha);
          ctx.stroke();
        }

        ctx.restore();
      }

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>
</body>
</html>
