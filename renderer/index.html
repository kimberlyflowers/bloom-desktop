<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLOOM Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f10;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    button, input { -webkit-app-region: no-drag; }

    /* ── HEADER ── */
    .header {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bloom-logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #FFB347, #F4A261, #E76F8A);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
    }
    .bloom-wordmark {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #FFB347, #E76F8A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-spacer { flex: 1; }
    .header-signout {
      font-size: 11px;
      color: #555;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: color 0.2s;
    }
    .header-signout:hover { color: #E76F8A; }

    /* ── SIGN-IN SCREEN ── */
    #screen-signin {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      min-height: calc(100vh - 60px);
    }

    .signin-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #FFB347, #F4A261, #E76F8A);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: white;
      margin-bottom: 16px;
    }

    .signin-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .signin-subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 28px;
    }

    .signin-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .signin-input {
      width: 100%;
      padding: 12px 14px;
      background: #1a1a1c;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .signin-input:focus {
      border-color: #F4A261;
    }
    .signin-input::placeholder {
      color: #555;
    }

    .signin-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #F4A261, #E76F8A);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
    }
    .signin-btn:active { transform: scale(0.97); }
    .signin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .signin-error {
      font-size: 12px;
      color: #ef4444;
      text-align: center;
      min-height: 18px;
      margin-top: 4px;
    }

    .signin-loading {
      font-size: 12px;
      color: #F4A261;
      text-align: center;
      min-height: 18px;
    }

    /* ── MAIN ── */
    .main { padding: 20px 24px; }

    /* Agent card */
    .agent-card {
      background: #1a1a1c;
      border: 1px solid #2a2a2e;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
    }
    .agent-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .agent-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #F4A261, #E76F8A);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .agent-name { font-size: 15px; font-weight: 600; }
    .agent-role { font-size: 12px; color: #888; margin-top: 2px; }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #888;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3a3a3e;
      transition: background 0.4s;
    }
    .status-dot.live { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    .status-dot.connecting { background: #FFB347; }
    .status-dot.error { background: #ef4444; }

    .frame-count {
      font-size: 11px;
      color: #555;
      font-variant-numeric: tabular-nums;
    }

    /* FPS bar */
    .fps-bar-wrap {
      margin-top: 12px;
      height: 3px;
      background: #2a2a2e;
      border-radius: 2px;
      overflow: hidden;
    }
    .fps-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FFB347, #E76F8A);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .stat-chip {
      flex: 1;
      background: #111113;
      border: 1px solid #222226;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: #666;
    }
    .stat-chip .val {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      display: block;
      margin-bottom: 2px;
    }
    .stat-chip .val.ok { color: #4ade80; }
    .stat-chip .val.warn { color: #FFB347; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 9px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-app-region: no-drag;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, #F4A261, #E76F8A);
      color: white;
    }
    .btn-secondary {
      background: #1e1e22;
      border: 1px solid #2e2e34;
      color: #aaa;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Emergency stop */
    .emergency {
      background: #1a0e0e;
      border: 1px solid #3d1515;
      border-radius: 10px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .emergency-label { font-size: 12px; color: #888; }
    .kbd {
      background: #2a1515;
      border: 1px solid #4a2020;
      border-radius: 5px;
      padding: 3px 7px;
      font-size: 11px;
      font-family: 'SF Mono', monospace;
      color: #f87171;
    }

    /* Dashboard link */
    .dashboard-btn {
      width: 100%;
      padding: 11px;
      background: transparent;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      color: #666;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .dashboard-btn:hover { border-color: #F4A261; color: #F4A261; }

    /* ── TAB BAR ── */
    .tab-bar {
      display: flex;
      gap: 0;
      padding: 14px 24px 0;
    }
    .tab {
      flex: 1;
      padding: 8px 0;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #666;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      -webkit-app-region: no-drag;
    }
    .tab.active {
      color: #F4A261;
      border-bottom-color: #F4A261;
    }
    .tab:hover { color: #aaa; }

    /* ── COWORK PANEL ── */
    .cowork-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .cowork-title {
      font-size: 14px;
      font-weight: 600;
      color: #f0f0f0;
    }
    .cowork-status {
      font-size: 11px;
      color: #666;
    }
    .cowork-status.live { color: #4ade80; }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 320px;
      overflow-y: auto;
    }
    .todo-empty {
      font-size: 12px;
      color: #555;
      text-align: center;
      padding: 20px 0;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #111113;
      border: 1px solid #222226;
      border-radius: 8px;
      font-size: 12px;
      transition: border-color 0.3s, background 0.3s;
    }
    .todo-item.in_progress {
      border-color: #F4A261;
      background: #1a1610;
    }
    .todo-item.completed {
      opacity: 0.5;
    }
    .todo-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #3a3a3e;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      transition: all 0.3s;
    }
    .todo-item.pending .todo-icon {
      border-color: #3a3a3e;
    }
    .todo-item.in_progress .todo-icon {
      border-color: #F4A261;
      background: #F4A261;
      color: #0f0f10;
    }
    .todo-item.completed .todo-icon {
      border-color: #4ade80;
      background: #4ade80;
      color: #0f0f10;
    }
    .todo-text {
      color: #ccc;
      line-height: 1.3;
    }
    .todo-item.in_progress .todo-text { color: #F4A261; }
    .todo-item.completed .todo-text { color: #888; text-decoration: line-through; }

    /* Active control border on popup */
    #control-border {
      position: fixed; inset: 0;
      border: 2px solid transparent;
      border-radius: 10px;
      pointer-events: none;
      z-index: 9999;
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    #control-border.active {
      border-color: #F4A261;
      box-shadow: inset 0 0 20px rgba(244,162,97,.1);
    }
  </style>
</head>
<body>
  <div id="control-border"></div>

  <!-- ═══════════════════════════════════════════════════════
       SIGN-IN SCREEN — shown on first launch / when logged out
       ═══════════════════════════════════════════════════════ -->
  <div id="screen-signin">
    <div class="header" style="position:absolute;top:0;left:0;right:0;">
      <div class="bloom-logo">B</div>
      <span class="bloom-wordmark">Bloom Desktop</span>
    </div>

    <div class="signin-logo">B</div>
    <div class="signin-title">Sign in to BLOOM</div>
    <div class="signin-subtitle">Connect your Bloomie to this computer</div>

    <div class="signin-form">
      <input type="email" id="signin-email" class="signin-input"
             placeholder="Email address" autocomplete="email" />
      <input type="password" id="signin-password" class="signin-input"
             placeholder="Password" autocomplete="current-password" />
      <button class="signin-btn" id="signin-btn" onclick="handleSignIn()">
        Sign In
      </button>
      <div class="signin-error" id="signin-error"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       MAIN APP — shown after successful auth
       ═══════════════════════════════════════════════════════ -->
  <div id="screen-app" style="display:none;">
    <div class="header">
      <div class="bloom-logo">B</div>
      <span class="bloom-wordmark">Bloom Desktop</span>
      <div class="header-spacer"></div>
      <button class="header-signout" id="btn-signout" onclick="handleSignOut()">Sign out</button>
    </div>

    <div class="tab-bar">
      <button class="tab active" id="tab-status" onclick="switchTab('status')">Status</button>
      <button class="tab" id="tab-cowork" onclick="switchTab('cowork')">Cowork</button>
    </div>

    <div class="main" id="panel-status">
      <!-- Agent card — populated dynamically -->
      <div class="agent-card">
        <div class="agent-row">
          <div class="agent-avatar" id="agent-avatar">--</div>
          <div>
            <div class="agent-name" id="agent-name-display">Loading...</div>
            <div class="agent-role" id="agent-role-display">AI Employee</div>
          </div>
        </div>

        <div class="status-row">
          <div class="status-pill">
            <div class="status-dot" id="stream-dot"></div>
            <span id="stream-label">Connecting...</span>
          </div>
          <div class="frame-count" id="frame-count">0 frames</div>
        </div>

        <div class="fps-bar-wrap">
          <div class="fps-bar" id="fps-bar"></div>
        </div>

        <div class="stats-row">
          <div class="stat-chip">
            <span class="val" id="latency-val">--</span>
            Latency
          </div>
          <div class="stat-chip">
            <span class="val" id="browser-val">--</span>
            Browser CDP
          </div>
          <div class="stat-chip">
            <span class="val" id="fps-val">0</span>
            FPS
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-test" onclick="testDashboard()">Test Connection</button>
        <button class="btn btn-secondary" id="btn-stop" onclick="emergencyStop()" disabled>Stop</button>
      </div>

      <!-- Emergency -->
      <div class="emergency">
        <span class="emergency-label">Emergency Stop</span>
        <span class="kbd" id="emergency-key">Cmd+Shift+Esc</span>
      </div>

      <!-- Dashboard link -->
      <button class="dashboard-btn" id="dashboard-link" onclick="openDashboard()">
        <span>&#8599;</span> <span id="dashboard-link-text">Open Dashboard</span>
      </button>
    </div>

    <div class="main" id="panel-cowork" style="display:none;">
      <div class="agent-card">
        <div class="cowork-header">
          <span class="cowork-title">Task Progress</span>
          <span class="cowork-status" id="cowork-status">Connecting...</span>
        </div>
        <div id="todo-list" class="todo-list">
          <div class="todo-empty" id="todo-empty-text">Waiting for your Bloomie to start a task...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
